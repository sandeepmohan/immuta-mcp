{{- if not .Values.immuta.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "immuta-mcp.fullname" . }}-immuta
  labels:
    {{- include "immuta-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  IMMUTA_API_KEY: {{ required "immuta.apiKey or immuta.existingSecret must be set" .Values.immuta.apiKey | quote }}
{{- end }}
---
{{- if not .Values.mcp.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "immuta-mcp.fullname" . }}-bearer
  labels:
    {{- include "immuta-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  MCP_BEARER_TOKEN: {{ required "mcp.bearerToken or mcp.existingSecret must be set" .Values.mcp.bearerToken | quote }}
{{- end }}
